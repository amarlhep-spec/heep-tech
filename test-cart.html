<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار السلة</title>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            text-align: center;
        }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px auto;
            max-width: 1000px;
        }
        
        .product-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .product-card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .product-card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .product-card .price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            margin: 5px;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .cart-count {
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>اختبار سلة التسوق</h1>
    
    <div>
        <span class="cart-count">0</span>
        <a href="cart.html">عرض السلة</a>
    </div>
    
    <div class="products">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" alt="هاتف 1">
            <h3>هاتف ذكي 1</h3>
            <p>وصف المنتج الأول</p>
            <div class="price">$299.99</div>
            <button class="btn btn-primary" onclick="addToCartFromPage('phone-1')">
                إضافة إلى السلة
            </button>
        </div>
        
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" alt="إكسسوار">
            <h3>إكسسوارات</h3>
            <p>وصف المنتج الثاني</p>
            <div class="price">$49.99</div>
            <button class="btn btn-primary" onclick="addToCartFromPage('accessory-1')">
                إضافة إلى السلة
            </button>
        </div>
        
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1556656793-08538906a9f8?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" alt="هاتف 2">
            <h3>هاتف ذكي 2</h3>
            <p>وصف المنتج الثالث</p>
            <div class="price">$399.99</div>
            <button class="btn btn-primary" onclick="addToCartFromPage('phone-2')">
                إضافة إلى السلة
            </button>
        </div>
    </div>
    
    
    
    <script src="database.js"></script>
    <script src="cart-functions.js"></script>
    
    <script>
        // تحديث العداد عند التحميل
        document.addEventListener('DOMContentLoaded', function() {
            if (window.db && window.db.updateCartCount) {
                db.updateCartCount();
            }
        });
    </script>
</body>
</html>
